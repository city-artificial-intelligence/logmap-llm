enable_thinking = false
interaction_style = 'vllm'
oracle_dev_prompt_template_name = 'class_subsumption'
oracle_user_prompt_template_name = 'sub_labels_only'
local_oracle_predictions_dirpath = '/home/jon/logmap_most_recent/results/anatomy/Qwen_Qwen3-32B/sub_labels_only/local-oracle'

[outputs]
